<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控 - 单片机传感器实时监控系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="logo">📊 单片机传感器实时监控系统</div>
        <div class="nav-menu">
            <a href="/index" class="active">实时监控</a>
            <a href="/history">历史数据&趋势图</a>
        </div>
        <div class="user-info">
            <span>欢迎你，{{ username }}</span>
            <a href="/logout" class="logout-btn">退出登录</a>
        </div>
    </nav>

    <!-- 页面标题 -->
    <h1 class="page-title">单片机传感器实时监控系统</h1>

    <!-- LCD1602模拟显示 -->
    <div class="lcd-box">
        <div class="lcd-title">LCD1602 模拟显示</div>
        <div class="lcd-content" id="lcd-content">
            ADJ: 0 NTC: 0<br>
            LIGHT: 0 STATUS: Dark TEMP: --.-°C
        </div>
        <div class="lcd-time" id="update-time">最后更新: --:--:--</div>
    </div>

    <!-- 数据卡片 -->
    <div class="data-card-container">
        <div class="data-card">
            <div class="card-title">
                <span>🎛️</span> 可调电阻 (ADJ)
            </div>
            <div class="card-value" id="adj-value">0</div>
            <div class="card-unit">8位AD值 (0-255)</div>
        </div>

        <div class="data-card">
            <div class="card-title">
                <span>🌡️</span> 热敏电阻 (NTC)
            </div>
            <div class="card-value" id="ntc-value">0</div>
            <div class="card-unit">8位AD值 (0-255)</div>
            <!-- 温度显示框 -->
            <div class="temp-tag" id="temp-tag">--.-°C</div>
        </div>

        <div class="data-card">
            <div class="card-title">
                <span>💡</span> 光敏电阻 (LIGHT)
            </div>
            <div class="card-value" id="light-value">0</div>
            <div class="card-unit">8位AD值 (0-255)</div>
            <div class="status-tag dark" id="status-tag">Dark</div>
        </div>
    </div>

    <!-- 连接状态 -->
    <div class="connect-status" id="connect-status">
        🔌 正在连接服务器...
    </div>

    <script>
        // ===================== 核心：更新页面数据函数 =====================
        function updatePageData(data) {
            console.log('收到后端推送数据：', data);
            // 更新LCD显示
            document.getElementById('lcd-content').innerHTML = `
                ADJ: ${data.adj} NTC: ${data.ntc}<br>
                LIGHT: ${data.light} STATUS: ${data.status} TEMP: ${data.temp}°C
            `;
            // 更新数值卡片
            document.getElementById('adj-value').innerText = data.adj;
            document.getElementById('ntc-value').innerText = data.ntc;
            document.getElementById('light-value').innerText = data.light;

            // 更新亮暗状态标签
            const statusTag = document.getElementById('status-tag');
            statusTag.innerText = data.status;
            statusTag.className = data.status === 'Dark' ? 'status-tag dark' : 'status-tag light';

            // 更新温度显示+变色
            const tempTag = document.getElementById('temp-tag');
            tempTag.innerText = data.temp + '°C';
            // 温度变色逻辑
            if (data.temp >= 30) {
                tempTag.style.background = 'rgba(231, 76, 60, 0.2)';
                tempTag.style.color = '#e74c3c';
                tempTag.style.borderColor = '#e74c3c';
            } else if (data.temp <= 10) {
                tempTag.style.background = 'rgba(52, 152, 219, 0.2)';
                tempTag.style.color = '#3498db';
                tempTag.style.borderColor = '#3498db';
            } else {
                tempTag.style.background = 'rgba(46, 204, 113, 0.2)';
                tempTag.style.color = '#2ecc71';
                tempTag.style.borderColor = '#2ecc71';
            }

            // 更新时间
            document.getElementById('update-time').innerText = `最后更新: ${data.update_time}`;
        }

        // ===================== 核心：WebSocket初始化 =====================
        function initWebSocket() {
            const wsUrl = 'ws://127.0.0.1:5000/ws/sensor';
            console.log('正在连接WebSocket：', wsUrl);

            const ws = new WebSocket(wsUrl);

            // 1. 连接成功
            ws.onopen = function() {
                console.log('✅ WebSocket连接成功！');
                document.getElementById('connect-status').innerHTML = '✅ 已连接到服务器，实时接收数据';
                document.getElementById('connect-status').style.color = '#39ff14';
                document.getElementById('connect-status').style.borderColor = '#39ff14';
                document.getElementById('connect-status').style.background = 'rgba(57, 255, 20, 0.1)';
            };

            // 2. 收到后端推送数据
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    updatePageData(data);
                } catch (e) {
                    console.error('❌ 数据解析失败：', e, '原始数据：', event.data);
                }
            };

            // 3. 连接关闭
            ws.onclose = function(e) {
                console.log('❌ WebSocket连接已关闭，3秒后自动重连...', e);
                document.getElementById('connect-status').innerHTML = '❌ 服务器连接断开，正在尝试重连...';
                document.getElementById('connect-status').style.color = '#e74c3c';
                document.getElementById('connect-status').style.borderColor = '#e74c3c';
                document.getElementById('connect-status').style.background = 'rgba(231, 76, 60, 0.1)';
                setTimeout(initWebSocket, 3000);
            };

            // 4. 连接错误
            ws.onerror = function(error) {
                console.error('❌ WebSocket连接错误：', error);
            };
        }

        // ===================== 页面加载完成，立刻执行 =====================
        window.onload = function() {
            console.log('页面加载完成，初始化WebSocket...');
            initWebSocket();
        };
    </script>
</body>
</html>
