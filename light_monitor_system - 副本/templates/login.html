<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 单片机传感器实时监控系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="form-container">
        <h2 class="form-title">用户登录</h2>
        {% if msg %}
        <div class="error-msg">{{ msg }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-box">
                    <input type="text" name="captcha" required placeholder="请输入4位验证码">
                    <img src="/captcha" id="captcha-img" title="点击刷新验证码" onclick="this.src='/captcha?'+Math.random()">
                </div>
            </div>
            <button type="submit" class="form-btn">登录</button>
        </form>
        <div class="form-tip">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
</body>
</html>
